<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      color: #111827;
      background:
        radial-gradient(circle at 15% 20%, rgba(139, 92, 246, 0.12), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(16, 185, 129, 0.10), transparent 40%),
        linear-gradient(135deg, #eef5ff 0%, #dfe8f5 46%, #cbd8e8 100%);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 12px;
      padding: 28px 28px 24px;
      box-shadow:
        0 4px 6px rgba(15, 23, 42, 0.04),
        0 20px 40px rgba(15, 23, 42, 0.12);
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #ffffff;
      flex: 0 0 auto;
      box-shadow: 0 6px 14px rgba(5, 150, 105, 0.3);
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
      line-height: 1.1;
    }

    .brand-sub {
      font-size: 11px;
      color: #6b7280;
      font-weight: 600;
      margin-top: 3px;
    }

    /* Alerts */
    .alerts { margin-bottom: 14px; display: grid; gap: 8px; }

    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .alert-error   { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .alert-warning { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .alert-success { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }

    /* Form */
    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      padding: 0 12px;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }

    .input-wrap:focus-within {
      border-color: #059669;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    .input-wrap svg { color: #9ca3af; flex: 0 0 auto; }

    .input-wrap input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      padding: 11px 0;
    }

    .input-wrap input::placeholder { color: #9ca3af; }

    /* Plain input (no icon) */
    input.plain-input {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }

    input.plain-input:focus {
      border-color: #059669;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    input.plain-input::placeholder { color: #9ca3af; }

    .btn-submit {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(5, 150, 105, 0.28);
      transition: opacity 0.18s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.99); }

    .footer-link {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }

    .footer-link a {
      color: #059669;
      font-weight: 700;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    /* Responsive tuning */
    @media (min-width: 481px) {
      body { font-size: 16px; padding: 24px; }
      .card { max-width: 460px; padding: 34px 34px 30px; }
      .brand { gap: 14px; margin-bottom: 28px; }
      .brand-icon { width: 56px; height: 56px; }
      .brand-title { font-size: 26px; }
      .brand-sub { font-size: 14px; line-height: 1.45; }
      .alert, label, .footer-link { font-size: 14px; }
      .input-wrap input { font-size: 15px; padding: 13px 0; }
      input.plain-input { font-size: 15px; padding: 13px 14px; }
      .btn-submit { height: 50px; font-size: 15px; }
    }

    @media (max-width: 480px) {
      body { font-size: 14px; padding: 14px; }
      .card { padding: 24px 20px; }
      .brand { gap: 10px; margin-bottom: 22px; }
      .brand-icon { width: 50px; height: 50px; }
      .brand-title { font-size: 24px; }
      .brand-sub { font-size: 13px; line-height: 1.45; }
      .alert, label, .footer-link { font-size: 13px; }
      .input-wrap input, input.plain-input { font-size: 14px; }
      .btn-submit { height: 48px; font-size: 14px; }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon"><i data-lucide="leaf" size="26"></i></div>
      <div>
        <div class="brand-title">Tạo tài khoản</div>
        <div class="brand-sub">Dùng cho demo phân loại chai nhựa / rác thải</div>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="alerts">
      {% for category, message in messages %}
      <div class="alert {% if category == 'error' %}alert-error{% elif category == 'warning' %}alert-warning{% else %}alert-success{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="full_name">Họ tên</label>
        <input id="full_name" name="full_name" type="text" class="plain-input" placeholder="Nhập họ và tên">
      </div>

      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <div class="input-wrap">
          <i data-lucide="user" size="18"></i>
          <input id="username" name="username" type="text" required placeholder="Tối thiểu 3 ký tự">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <i data-lucide="lock-keyhole" size="18"></i>
          <input id="password" name="password" type="password" required placeholder="Tối thiểu 4 ký tự">
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <i data-lucide="shield-check" size="18"></i>
          <input id="confirm_password" name="confirm_password" type="password" required placeholder="Nhập lại mật khẩu">
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i data-lucide="user-plus" size="18"></i>
        Đăng ký
      </button>
    </form>

    <p class="footer-link">
      Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a>
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
